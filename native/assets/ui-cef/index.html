<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dauntless</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/target_list.css">
    <link rel="stylesheet" href="css/sensors.css">
    <link rel="stylesheet" href="css/sdk_mirror.css">
    <link rel="stylesheet" href="panels/ship_display/ship_display.css">
    <link rel="stylesheet" href="panels/weapons_display/weapons_display.css">
    <link rel="stylesheet" href="css/configuration_panel.css">
    <link rel="stylesheet" href="css/ship_property_viewer.css">
</head>
<body>
    <!-- Pause menu overlay.
         Python toggles visibility via cef_execute_javascript on the
         #pause-menu container, and pushes the row list + focused index
         via setPauseMenu({items:[...], focused:N}). Row clicks call
         dauntlessEvent(action), which navigates to dauntless://event/<a>;
         OnBeforeBrowse on the C++ side intercepts and dispatches.
         Spec: docs/ui_designs/10-pause-menu.md -->
    <div id="pause-menu">
        <div class="pause-panel">
            <div class="pause-header">Game Paused</div>
            <div class="pause-body" id="pause-menu-list"></div>
        </div>
    </div>

    <!-- Mission picker overlay (developer-only).
         Visibility controlled by JS via setMissionPicker({tree, visible}).
         Container is gated by .dev-only so production builds never see it.
         Spec: docs/superpowers/specs/2026-06-02-dev-mission-loader-design.md -->
    <section id="mission-picker" class="dev-only">
        <div class="mp-panel">
            <div class="mp-header">Load Mission</div>
            <div class="mp-body" id="mission-picker-body"></div>
            <div class="mp-footer">
                <button class="mp-cancel-button"
                        onclick="dauntlessEvent('mission-picker/cancel')">
                    Cancel
                </button>
            </div>
        </div>
    </section>

    <!-- Configuration overlay (production).
         setConfigurationPanel({...}) drives state; clicks fire
         dauntlessEvent('configuration/<verb>:<arg>'). ESC and the Done
         button both fire 'configuration/cancel'.
         Spec: docs/superpowers/specs/2026-06-05-configuration-panel-design.md -->
    <section id="configuration-panel">
      <div class="cp-modal">
        <div class="cp-header">Configuration</div>
        <div class="cp-content">
          <nav class="cp-tabstrip" id="cp-tabstrip"></nav>
          <div class="cp-body" id="cp-body"></div>
        </div>
        <div class="cp-footer">
          <button class="cp-done-button"
                  onclick="dauntlessEvent('configuration/cancel')">
            Done
          </button>
        </div>
      </div>
    </section>

    <!-- Developer Options overlay (developer-only).
         setDeveloperOptions({...}) drives state; clicks fire
         dauntlessEvent('developer-options/<verb>:<arg>'). ESC and the
         Done button both fire 'developer-options/cancel'. The .dev-only
         class keeps it hidden outside --developer; the panel is also only
         registered with the PanelRegistry under --developer.
         Spec: docs/superpowers/specs/2026-06-08-developer-options-menu-design.md -->
    <section id="developer-options-panel" class="dev-only">
      <div class="cp-modal">
        <div class="cp-header">Developer Options</div>
        <div class="cp-content">
          <nav class="cp-tabstrip" id="do-tabstrip"></nav>
          <div class="cp-body" id="do-body"></div>
        </div>
        <div class="cp-footer">
          <button class="cp-done-button"
                  onclick="dauntlessEvent('developer-options/cancel')">
            Done
          </button>
        </div>
      </div>
    </section>

    <!-- Ship Property Viewer overlay (developer-only).
         setShipPropertyViewer({visible, pin_count, selected}) drives state.
         The overlay is transparent full-viewport; only the titlebar and
         popover are opaque chrome. pointer-events:none on #spv-root lets
         GL orbit-drag reach the host; the titlebar/popover restore auto.
         Close button fires dauntlessEvent('ship-property-viewer/cancel').
         The .dev-only class keeps it hidden outside --developer.
         Spec: docs/superpowers/specs/2026-06-08-ship-property-viewer-design.md -->
    <div id="spv-root" class="spv-root dev-only">
      <div class="spv-titlebar">
        <span class="spv-title">Ship Property Viewer</span>
        <span id="spv-pincount" class="spv-pincount"></span>
        <button class="spv-close" onclick="shipPropertyViewerClose()">&#x2715;</button>
      </div>
      <div id="spv-popover" class="spv-popover"></div>
    </div>

    <!-- Tactical-view layout zones. All panels are flex children of one
         of these two containers; no panel uses absolute/fixed positioning
         of its own. Order in DOM is also visual order.
           #tactical-left-column — full-height column at the left edge:
             top: officer/tactical menus (future), target ship-display
                  (when a target is selected), target list
             bottom: sensors / radar disc (pinned via flex split)
           #tactical-bottom-row — bottom-right cluster:
             player ship-display today; weapons / speed / alerts join later
         See docs/ui_designs/tactical_ui_state.md "Layout gap". -->
    <div id="tactical-left-column">
        <div id="tactical-target-stack">
            <!-- Target ship status — visible only when the player has
                 selected a target ship. Renders the same composite
                 (silhouette + shields + hull bar) as the player panel. -->
            <section class="bc-panel ship-display" id="ship-display-target" data-role="target" hidden>
              <header class="bc-panel__header">
                <span class="bc-panel__title" data-bind="title">NO TARGET</span>
                <button class="bc-panel__minimize" data-event="ship-target/minimize-toggle"
                        onclick="dauntlessEvent('ship-target/minimize-toggle')">&#9660;</button>
              </header>
              <div class="bc-panel__body">
                <div class="ship-display__silhouette-stack">
                  <img class="ship-display__silhouette" data-bind="silhouette" alt="" hidden>
                  <div class="ship-display__shield shield--top"    data-bind="shield-top"    data-integrity="down"></div>
                  <div class="ship-display__shield shield--bottom" data-bind="shield-bottom" data-integrity="down"></div>
                  <div class="ship-display__shield shield--front"  data-bind="shield-front"  data-integrity="down"></div>
                  <div class="ship-display__shield shield--rear"   data-bind="shield-rear"   data-integrity="down"></div>
                  <div class="ship-display__shield shield--left"   data-bind="shield-left"   data-integrity="down"></div>
                  <div class="ship-display__shield shield--right"  data-bind="shield-right"  data-integrity="down"></div>
                  <div class="ship-display__damage-overlay" data-bind="damage-overlay"></div>
                </div>
                <div class="ship-display__hull-bar">
                  <div class="ship-display__hull-fill" data-bind="hull-fill"></div>
                  <span class="ship-display__hull-pct" data-bind="hull-pct">0%</span>
                </div>
                <div class="ship-display__target-extras" data-bind="target-extras">
                  <span data-bind="range">&#8212; km</span>
                  <span data-bind="speed">&#8212; kph</span>
                </div>
              </div>
            </section>

            <!-- Target list panel.
                 State pushed via setTargetList({visible, selected, rows});
                 row clicks fire dauntlessEvent('target/<ship>'); PanelRegistry
                 routes to TargetListView.dispatch_event in Python.
                 Spec: docs/ui_designs/02-tactical-cluster.md -->
            <div id="target-list-panel" class="target-list--hidden">
                <div class="target-list__header">Targets</div>
                <div class="target-list__body" id="target-list-body"></div>
            </div>
        </div>

        <!-- Sensors / radar panel — pinned to the bottom of the left
             column via the parent's flex split (target-stack grows,
             radar is flex: 0 0 auto).
             State pushed via setRadar({visible, minimizable, minimized,
             range_gu, contacts:[...]}). Header caret toggles collapse.
             Spec: docs/ui_designs/05-sensors-radar.md -->
        <div id="tactical-radar">
            <div id="sensors-panel" class="sensors--hidden">
                <div class="sensors__header">
                    <span>Sensors</span>
                    <span class="sensors__caret" id="sensors-caret"
                          onclick="dauntlessEvent('sensors/toggle')">&#9662;</span>
                </div>
                <div class="sensors__body">
                    <div class="sensors__disc">
                        <div class="sensors__disc-plane">
                            <div class="sensors__ring-outer"></div>
                            <div class="sensors__ring-mid"></div>
                            <div class="sensors__ring-inner"></div>
                            <div class="sensors__cardinal-v"></div>
                            <div class="sensors__cardinal-h"></div>
                            <div class="sensors__player"></div>
                        </div>
                        <div class="sensors__contacts" id="sensors-contacts"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom-row cluster: player ShipDisplay + WeaponsDisplay.
         WeaponsDisplay folds the speed readout into its header in
         BC's "Speed {imp} : {vel} kph" format — see the spec at
         docs/ui_designs/04-weapons-and-speed.md and BridgeHandlers
         HelmUpdateToolTip (sdk/.../BridgeHandlers.py:1389-1396). -->
    <div id="tactical-bottom-row">
        <section class="bc-panel ship-display" id="ship-display-player" data-role="player" hidden>
          <header class="bc-panel__header">
            <span class="bc-panel__title" data-bind="title">PLAYER</span>
            <button class="bc-panel__minimize" data-event="ship-player/minimize-toggle"
                    onclick="dauntlessEvent('ship-player/minimize-toggle')">&#9660;</button>
          </header>
          <div class="bc-panel__body">
            <div class="ship-display__silhouette-stack">
              <img class="ship-display__silhouette" data-bind="silhouette" alt="" hidden>
              <div class="ship-display__shield shield--top"    data-bind="shield-top"    data-integrity="down"></div>
              <div class="ship-display__shield shield--bottom" data-bind="shield-bottom" data-integrity="down"></div>
              <div class="ship-display__shield shield--front"  data-bind="shield-front"  data-integrity="down"></div>
              <div class="ship-display__shield shield--rear"   data-bind="shield-rear"   data-integrity="down"></div>
              <div class="ship-display__shield shield--left"   data-bind="shield-left"   data-integrity="down"></div>
              <div class="ship-display__shield shield--right"  data-bind="shield-right"  data-integrity="down"></div>
              <div class="ship-display__damage-overlay" data-bind="damage-overlay"></div>
            </div>
            <div class="ship-display__hull-bar">
              <div class="ship-display__hull-fill" data-bind="hull-fill"></div>
              <span class="ship-display__hull-pct" data-bind="hull-pct">100%</span>
            </div>
          </div>
        </section>

        <!-- WeaponsDisplay — player-only panel mirroring the SDK's
             Tactical/Interface/WeaponsDisplay.py. The panel header
             doubles as BC's speed readout (Speed {imp} : {vel} kph),
             replacing the standalone SpeedDisplay. State pushed via
             setWeaponsDisplay({visible, ship_name, speed_label,
             silhouette_url, weapon_icons:[...]}). -->
        <section class="bc-panel weapons-display" id="weapons-display" hidden>
          <header class="bc-panel__header">
            <span class="bc-panel__title" data-bind="speed-label">Speed 0 : 0 kph</span>
          </header>
          <div class="bc-panel__body">
            <div class="weapons-display__silhouette-stack">
              <!-- The inner pane stays at the SDK's natural 130x110 px
                   so icon positions land at literal (x_px, y_px); the
                   outer stack drives visual size via CSS transform: scale.
                   See weapons_display.css for the scale knob. -->
              <div class="weapons-display__pane">
                <div class="weapons-display__weapons weapons--below" data-bind="weapons-below"></div>
                <img class="weapons-display__silhouette" data-bind="silhouette" alt="" hidden>
                <div class="weapons-display__weapons weapons--above" data-bind="weapons-above"></div>
              </div>
            </div>
          </div>
        </section>
    </div>

    <!-- SDK UI mirror slots — receive payloads from SDKMirrorPanel.
         #sdk-subtitle: bottom-anchored mission-objective/banner strip.
         #sdk-stylized-stack: centred dauntless-styled modal stack.
         Spec: docs/superpowers/specs/2026-06-03-cef-sdk-ui-mirror-design.md -->
    <div id="sdk-subtitle" class="sdk-mirror" hidden></div>
    <div id="sdk-stylized-stack" class="sdk-mirror"></div>

    <script src="js/mission_picker.js"></script>
    <script src="js/pause_menu.js"></script>
    <script src="js/target_list.js"></script>
    <script src="js/sensors.js"></script>
    <script src="panels/ship_display/ship_display.js"></script>
    <script src="panels/weapons_display/weapons_display.js"></script>
    <script src="js/sdk_mirror.js"></script>
    <script src="js/configuration_panel.js"></script>
    <script src="js/developer_options.js"></script>
    <script src="js/ship_property_viewer.js"></script>
</body>
</html>
